<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfoNURSE</title>

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a0f1c;
    font-family: monospace;
    overflow: hidden;
}

/* subtle tech grid */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
}

/* center container */
.container {
    text-align: center;
    z-index: 1;
}

/* logo */
.logo {
    max-width: 700px;
    width: 80%;
    filter: drop-shadow(0 0 25px rgba(0,200,255,0.4));
}

/* tagline */
.tagline {
    margin-top: 25px;
    font-size: 18px;
    color: #9bb3c9;
    letter-spacing: 2px;
}

</style>
</head>

<body>

<div class="container">

<img src="infonurse.png" class="logo" alt="InfoNURSE Logo">

<div class="tagline">
Clinical Informatics • Nursing • Technology
</div>

</div>

</body>
</html>
